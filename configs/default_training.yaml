# Training related configuration
training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  save_every: 5
  device: "cuda"  # cuda, cpu, auto
  seed: 42

# Optimizer configuration
optimizer:
  name: "adam"  # adam, adamw, sgd
  momentum: 0.9  # for SGD only

# Learning rate scheduler configuration
scheduler:
  name: "step"  # step, cosine, plateau, none
  step_size: 30
  gamma: 0.1
  T_max: 200
  patience: 10

# Data configuration
data:
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  shuffle: true
  num_workers: 4

# Logging configuration
logging:
  log_dir: "logs"
  log_level: "INFO"
  save_logs: true
