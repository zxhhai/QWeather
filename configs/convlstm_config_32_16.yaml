# ConvLSTM model configuration
model:
  name: "convlstm"
  input_dim: 10
  output_dim: 10
  T_out: 1
  num_layers: 2
  hidden_dim_list: [32, 16]
  kernel_size_list: [[3, 3], [3, 3]]

# Training configuration
training:
  epochs: 100
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 20
  save_every: 5
  device: "cuda"
  seed: 42
  resume: false

# Optimizer configuration
optimizer:
  name: "adam"
  momentum: 0.9

# Scheduler configuration
scheduler:
  name: "step"
  step_size: 30
  gamma: 0.1
  T_max: 200
  patience: 10

# Data configuration
data:
  file_path: "/root/autodl-tmp/all_dataset.nc" # path to the dataset file
  var_name: ["chla", "hcho", "no2", "o3", "par", "sla", "sst", "wind", "DML", "isoprene"]
  input_seq_len:  6 
  target_seq_len: 1
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  indices_dir: "/root/autodl-tmp/QWeather/datasets/split/large" # path to indices directory
  shuffle: true
  num_workers: 4
  normalize: true
  scaler_type: "standard" # "minmax" or "standard"

# Logging configuration
logging:
  log_dir: "logs/convlstm"
  save_logs: true
