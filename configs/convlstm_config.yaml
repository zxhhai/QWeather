# ConvLSTM model configuration
model:
  name: "convlstm"
  input_dim: 4
  hidden_dim_list: [16, 16, 4]
  kernel_size_list: [[3, 3], [3, 3], [3, 3]]  # 改为嵌套列表，而不是元组
  num_layers: 3
  output_dim: 4
  T_out: 1
  dropout: 0.2

# Training configuration
training:
  epochs: 100
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  save_every: 5
  device: "cuda"
  seed: 42

# Optimizer configuration
optimizer:
  name: "adam"
  momentum: 0.9

# Scheduler configuration
scheduler:
  name: "step"
  step_size: 30
  gamma: 0.1
  T_max: 200
  patience: 10

# Data configuration
data:
  file_path: "/home/zxh/CQ/QWeather/testdata/test_data.nc"
  var_name: "data"
  input_seq_len: 8
  target_seq_len: 1
  train_ratio: 0.7
  val_ratio: 0.2
  test_ratio: 0.1
  shuffle: true
  num_workers: 4

# Logging configuration
logging:
  log_dir: "logs"
  log_level: "INFO"
  save_logs: true